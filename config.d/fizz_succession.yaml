
# FizzBob — Operator Cognitive Load Modeling Engine
# Because real-time systems are only as reliable as the humans
# who monitor them. FizzBob tracks the cognitive state of Bob,
# the hypothetical operator responsible for watching FizzBuzz
# evaluations in production. The model is grounded in NASA-TLX
# workload assessment (Hart & Staveland, 1988), the two-process
# circadian model (Borbely, 1982), alert fatigue habituation,
# and the Maslach Burnout Inventory (Maslach & Jackson, 1981).
# Overload Mode activates when cognitive capacity is exceeded,
# signaling the need for operator rotation or workload reduction.
# FizzPager — Incident Paging & Escalation Engine
# PagerDuty-style incident management lifecycle for the Enterprise
# FizzBuzz Platform.  Provides 24/7 on-call scheduling, four-tier
# escalation (L1-L4, all Bob), alert deduplication, correlation,
# noise reduction, and blameless postmortem generation.  MTTA of
# 0.000s because Bob is the system and the system acknowledges
# instantly.
# ── FizzSuccession: Operator Succession Planning Framework ──────────
# Monitors organizational continuity risk by tracking the bus factor,
# skills coverage, cross-training depth, and hiring pipeline status.
# With a single operator (Bob), the bus factor is 1 (CRITICAL risk)
# and the PCRS is 97.3 (operationally excellent but organizationally
# fragile).  All 108 infrastructure modules are cataloged as skills
# requiring succession coverage.
fizz_succession:
  enabled: false                          # Master switch — opt-in via --succession
  operator: Bob                           # The sole operator of the platform
  dashboard:
    width: 72                             # ASCII dashboard width
