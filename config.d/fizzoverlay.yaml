
fizzoverlay:
  enabled: false                          # Master switch — opt-in via --overlay
  max_layers: 128                         # Maximum layers in the content-addressable store
  layer_cache_size: 64                    # Maximum cached unpacked layers (LRU)
  default_compression: gzip              # Compression for layer archives (none, gzip, zstd)
  dashboard:
    width: 72                             # ASCII dashboard width
