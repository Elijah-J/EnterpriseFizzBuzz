# ============================================================
# Enterprise FizzBuzz Platform - Configuration
# ============================================================
# This file controls ALL aspects of the FizzBuzz evaluation
# pipeline. Modify with caution. Changes require a full
# service restart.
# ============================================================

# Application metadata
application:
  name: "Enterprise FizzBuzz Platform"
  version: "1.0.0"
  environment: "production"

# Numeric range for FizzBuzz evaluation
range:
  start: 1
  end: 100

# Rule definitions
# Each rule has a name, divisor, label, and priority
rules:
  - name: "FizzRule"
    divisor: 3
    label: "Fizz"
    priority: 1
  - name: "BuzzRule"
    divisor: 5
    label: "Buzz"
    priority: 2

# Evaluation engine settings
engine:
  strategy: "standard"  # standard | chain_of_responsibility | parallel_async | machine_learning
  max_concurrent_evaluations: 10
  timeout_ms: 5000

# Output configuration
output:
  format: "plain"  # plain | json | xml | csv
  include_metadata: false
  include_summary: true
  colorize: false

# Logging configuration
logging:
  level: "INFO"  # SILENT | ERROR | WARNING | INFO | DEBUG | TRACE
  include_timestamps: true
  log_to_file: false
  log_file_path: "fizzbuzz.log"

# Observer configuration
observers:
  console_observer:
    enabled: false
  statistics_observer:
    enabled: true

# FizzLife — Flow-Lenia Continuous Cellular Automaton Engine
# Embeds FizzBuzz evaluation into a continuous cellular automaton
# (Lenia) for spatiotemporal pattern classification.
fizzlife:
  enabled: false
  grid_width: 64
  grid_height: 64
  dt: 0.1
  max_generations: 500
  convergence_threshold: 0.001
  mass_tolerance: 0.05
  seed: null
  kernel:
    type: "polynomial"
    radius: 13
    alpha: 4.0
    peaks: [1.0]
    normalize: true
  growth:
    type: "gaussian"
    center: 0.15
    width: 0.065
  species:
    min_mass: 0.01
    stability_window: 10
    similarity_threshold: 0.85
  evolution:
    enabled: false
    population_size: 20
    generations: 50
    mutation_rate: 0.2
    crossover_rate: 0.7
    fitness_weights:
      diversity: 0.40
      longevity: 0.30
      complexity: 0.30
  dashboard:
    width: 72
    grid_display_size: 32
