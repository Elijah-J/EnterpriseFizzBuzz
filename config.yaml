# ============================================================
# Enterprise FizzBuzz Platform - Configuration
# ============================================================
# This file controls ALL aspects of the FizzBuzz evaluation
# pipeline. Modify with caution. Changes require a full
# service restart.
# ============================================================

# Application metadata
application:
  name: "Enterprise FizzBuzz Platform"
  version: "1.0.0"
  environment: "production"

# Numeric range for FizzBuzz evaluation
range:
  start: 1
  end: 100

# Rule definitions
# Each rule has a name, divisor, label, and priority
rules:
  - name: "FizzRule"
    divisor: 3
    label: "Fizz"
    priority: 1
  - name: "BuzzRule"
    divisor: 5
    label: "Buzz"
    priority: 2

# Evaluation engine settings
engine:
  strategy: "standard"  # standard | chain_of_responsibility | parallel_async | machine_learning
  max_concurrent_evaluations: 10
  timeout_ms: 5000

# Output configuration
output:
  format: "plain"  # plain | json | xml | csv
  include_metadata: false
  include_summary: true
  colorize: false

# Logging configuration
logging:
  level: "INFO"  # SILENT | ERROR | WARNING | INFO | DEBUG | TRACE
  include_timestamps: true
  log_to_file: false
  log_file_path: "fizzbuzz.log"

# Middleware pipeline (executed in order of priority)
middleware:
  timing:
    enabled: true
    priority: 1
  logging:
    enabled: true
    priority: 2
  validation:
    enabled: true
    priority: 0

# Plugin system
plugins:
  auto_discover: true
  plugin_directory: "./plugins"
  enabled_plugins: []

# Circuit breaker configuration
# Protects the FizzBuzz evaluation pipeline from cascading failures
# by monitoring error rates and temporarily rejecting requests when
# the system is unhealthy. Because even modulo arithmetic deserves
# fault tolerance.
circuit_breaker:
  enabled: false
  failure_threshold: 5          # Number of failures before tripping
  success_threshold: 3          # Successes needed to close from half-open
  timeout_ms: 30000             # Time in OPEN state before trying half-open
  sliding_window_size: 10       # Size of the sliding window for error tracking
  half_open_max_calls: 3        # Max concurrent calls allowed in half-open
  backoff_base_ms: 1000         # Base delay for exponential backoff
  backoff_max_ms: 60000         # Maximum backoff delay
  backoff_multiplier: 2.0       # Exponential backoff multiplier
  ml_confidence_threshold: 0.7  # Min ML confidence before counting as degraded
  call_timeout_ms: 5000         # Per-call timeout in milliseconds

# Internationalization (i18n) configuration
# Controls the locale-aware translation subsystem.
# Because FizzBuzz output in only one language is a clear
# violation of enterprise globalization standards.
i18n:
  enabled: true                 # Master switch for the i18n subsystem
  locale: "en"                  # Active locale (overridable via --locale or EFP_LOCALE)
  locale_directory: "./locales" # Directory containing .fizztranslation files
  strict_mode: false            # If true, missing keys raise errors instead of falling back
  fallback_chain:               # Global fallback chain (locale files may override)
    - "en"
  log_missing_keys: true        # Log warnings when translation keys are not found

# Distributed tracing configuration
# OpenTelemetry-style span collection for full pipeline observability.
# Because you can't truly understand FizzBuzz until you've seen
# a flame graph of it.
tracing:
  enabled: false                  # Master switch for the tracing subsystem
  export_format: "waterfall"      # waterfall | json
  waterfall_width: 60             # Character width of the timeline bar
  timing_precision: "us"          # us (microseconds) | ns (nanoseconds)

# Role-Based Access Control (RBAC) configuration
# Controls who can FizzBuzz what, because unrestricted modulo
# arithmetic is a security incident waiting to happen.
rbac:
  enabled: false
  default_role: "ANONYMOUS"
  token_secret: "enterprise-fizzbuzz-secret-do-not-share"
  token_ttl_seconds: 3600
  token_issuer: "enterprise-fizzbuzz-platform"
  access_denied_contact_email: "fizzbuzz-security@enterprise.example.com"
  next_training_session: "2026-04-01T09:00:00Z"

# Event Sourcing / CQRS configuration
# Because every FizzBuzz evaluation deserves an append-only audit
# log, command/query segregation, and point-in-time state reconstruction.
# Martin Fowler would be so proud. Or horrified. Hard to tell.
event_sourcing:
  enabled: false
  snapshot_interval: 10          # Take a snapshot every N events
  max_events_before_compaction: 1000  # Compact the event store after N events
  enable_temporal_queries: true  # Allow point-in-time state reconstruction
  enable_projections: true       # Maintain materialized read-model views
  event_version: 1               # Current event schema version

# Chaos Engineering / Fault Injection configuration
# Because if your FizzBuzz platform can't survive a monkey
# randomly corrupting modulo results, injecting latency,
# and throwing exceptions, is it really enterprise-ready?
chaos:
  enabled: false                  # Master switch — opt-in only, we're not monsters
  level: 1                        # Severity 1-5 (1=gentle breeze, 5=category 5 hurricane)
  fault_types:                    # Which fault types are armed
    - "RESULT_CORRUPTION"
    - "LATENCY_INJECTION"
    - "EXCEPTION_INJECTION"
    - "RULE_ENGINE_FAILURE"
    - "CONFIDENCE_MANIPULATION"
  latency:
    min_ms: 10                    # Minimum injected latency
    max_ms: 500                   # Maximum injected latency
  seed: null                      # Random seed for reproducibility (null = entropy)

# Feature Flags / Progressive Rollout configuration
# Because the ability to toggle FizzBuzz rules on and off at runtime
# is clearly a mission-critical capability that every enterprise
# platform demands. Without feature flags, how would you progressively
# roll out the "Wuzz" rule to 30% of your integers?
feature_flags:
  enabled: false                    # Master switch — opt-in via --feature-flags
  default_lifecycle: "ACTIVE"       # Default lifecycle state for new flags
  log_evaluations: true             # Log every flag evaluation for audit compliance
  strict_dependencies: true         # Enforce dependency graph constraints
  predefined_flags:
    fizz_rule_enabled:
      type: "BOOLEAN"
      enabled: true
      description: "Controls the sacred Fizz rule (divisor=3)"
    buzz_rule_enabled:
      type: "BOOLEAN"
      enabled: true
      description: "Controls the venerable Buzz rule (divisor=5)"
    wuzz_rule_experimental:
      type: "PERCENTAGE"
      enabled: true
      percentage: 30
      description: "Experimental Wuzz rule (divisor=7) — 30% progressive rollout"
    wuzz_prime_targeting:
      type: "TARGETING"
      enabled: true
      targeting_rule: "prime"
      description: "Wuzz targeting: only activates for prime numbers"
      dependencies:
        - "wuzz_rule_experimental"
    ml_strategy_canary:
      type: "PERCENTAGE"
      enabled: false
      percentage: 10
      description: "Canary rollout for ML evaluation strategy"
    blockchain_audit:
      type: "BOOLEAN"
      enabled: false
      description: "Toggle blockchain audit ledger at runtime"
    tracing_enabled:
      type: "BOOLEAN"
      enabled: false
      description: "Toggle distributed tracing at runtime"

# SLA Monitoring / PagerDuty-Style Alerting configuration
# Because the only thing more important than computing FizzBuzz
# correctly is proving, with mathematical certainty, that you
# computed it within the agreed-upon latency budget. Service Level
# Agreements for modulo arithmetic: the pinnacle of enterprise
# engineering.
sla:
  enabled: false                    # Master switch — opt-in via --sla
  slos:
    latency:
      target: 0.999                 # 99.9% of evaluations under threshold
      threshold_ms: 100.0           # Maximum acceptable latency per evaluation
    accuracy:
      target: 0.99999               # 99.999% accuracy (five nines of correctness)
    availability:
      target: 0.9999                # 99.99% availability (four nines)
  error_budget:
    window_days: 30                 # Rolling window for error budget calculation
    burn_rate_threshold: 2.0        # Alert when burning budget 2x faster than planned
  alerting:
    cooldown_seconds: 60            # Minimum seconds between alerts of the same type
    escalation_timeout_seconds: 300 # Seconds before escalating to next level
  on_call:
    team_name: "FizzBuzz Reliability Engineering"
    rotation_interval_hours: 168    # Weekly rotation (168 hours = 7 days)
    engineers:
      - name: "Bob McFizzington"
        email: "bob.mcfizzington@enterprise.example.com"
        phone: "+1-555-FIZZBUZZ"
        title: "Senior Principal Staff FizzBuzz Reliability Engineer II"

# In-Memory Caching Layer configuration
# Because the result of 15 % 3 might change between invocations,
# and we need to be prepared. Caching modulo arithmetic results
# is the kind of optimization that makes senior engineers weep —
# either from pride or from despair, depending on their perspective.
cache:
  enabled: false                     # Master switch — opt-in via --cache
  max_size: 1024                     # Maximum number of cached FizzBuzz results
  ttl_seconds: 3600.0                # Time-to-live for cache entries (1 hour)
  eviction_policy: "lru"             # lru | lfu | fifo | dramatic_random
  enable_coherence_protocol: true    # Enable MESI state tracking (pointless but thorough)
  enable_eulogies: true              # Generate satirical obituaries for evicted entries
  warming:
    enabled: false                   # Pre-populate cache on startup (defeats the purpose)
    range_start: 1                   # Warming range start
    range_end: 100                   # Warming range end

# Database Migration Framework configuration
# Because managing schema migrations for in-memory data structures
# that vanish when the process exits is the pinnacle of ephemeral
# database administration. Every dict deserves a migration history.
migrations:
  enabled: false                     # Master switch — opt-in via --migrate
  auto_apply: false                  # Automatically apply pending migrations on startup
  seed_range_start: 1                # Start of range for FizzBuzz seed data generation
  seed_range_end: 50                 # End of range for seed data (the ouroboros range)
  log_fake_sql: true                 # Log fake SQL statements for maximum enterprise cosplay
  visualize_schema: true             # Render ASCII ER diagrams after migrations

# Repository Pattern + Unit of Work configuration
# Because storing FizzBuzz results in a variable wasn't enterprise
# enough, you can now persist them across THREE different backends,
# each more unnecessarily durable than the last.
repository:
  backend: "none"                  # none | in_memory | sqlite | filesystem
  db_path: "fizzbuzz_results.db"   # SQLite database path (sqlite backend)
  fs_path: "./fizzbuzz_results"    # Filesystem directory (filesystem backend)

# Anti-Corruption Layer / ML Strategy configuration
# Because the ML engine's probabilistic outputs need a formal
# translation layer before they're allowed anywhere near the
# domain model. Without these thresholds, raw sigmoid outputs
# would leak into business logic, and that's a DDD violation
# punishable by architecture review board.
ml:
  decision_threshold: 0.5              # Confidence above which a prediction is a match
  ambiguity_margin: 0.1                # Margin around threshold for ambiguity detection
  enable_disagreement_tracking: false  # Cross-check ML against deterministic baseline

# Dependency Injection Container configuration
# Because manually calling constructors is a solved problem, and the
# solution involves a registry, lifetime management, topological sorting,
# and a fluent API. The container does NOT replace existing wiring — it
# provides a parallel universe of object construction that exists purely
# to demonstrate that we could have done it this way, had we wanted to
# add yet another layer of abstraction.
di:
  enabled: false                     # Master switch — the container is always available
  default_lifetime: "transient"      # Default lifetime for auto-registered services
  cycle_detection: true              # Validate dependency graph at registration time
  verbose_resolution_logging: false  # Log every resolve() call (noisy but educational)

# Kubernetes-Style Health Check Probes configuration
# Because monitoring the health of a FizzBuzz platform with
# liveness, readiness, and startup probes is exactly the kind
# of operational maturity that Kubernetes demands. If your
# FizzBuzz pod fails a liveness check, it gets restarted.
# If it fails readiness, traffic is diverted. If it fails
# startup, it never joins the cluster. Production-grade.
health_check:
  enabled: false                     # Master switch — opt-in via --health
  liveness:
    canary_number: 15                # Number to evaluate as liveness canary
    canary_expected: "FizzBuzz"      # Expected result from canary evaluation
    interval_seconds: 30             # How often to run liveness checks (aspirational)
  readiness:
    required_subsystems:             # Subsystems that must be UP for readiness
      - "config"
      - "circuit_breaker"
      - "cache"
      - "sla"
      - "ml_engine"
    degraded_is_ready: true          # Treat DEGRADED subsystems as ready
  startup:
    milestones:                      # Boot sequence milestones to track
      - "config_loaded"
      - "rules_initialized"
      - "engine_created"
      - "middleware_assembled"
      - "service_built"
    timeout_seconds: 60              # Max time for startup sequence
  self_healing:
    enabled: true                    # Attempt automatic recovery on failures
    max_retries: 3                   # Maximum recovery attempts per subsystem
    backoff_base_ms: 500             # Base delay between recovery attempts
  dashboard:
    width: 60                        # ASCII dashboard width
    show_details: true               # Show diagnostic details in dashboard

# Prometheus-Style Metrics Exporter configuration
# Because the only thing more important than computing FizzBuzz
# correctly is collecting Prometheus-style time series data about
# how you computed it. Every counter increment, every histogram
# observation, every gauge fluctuation — all rendered in the
# Prometheus text exposition format that nobody will scrape
# because this is a CLI tool, not an HTTP server.
metrics:
  enabled: false                     # Master switch — opt-in via --metrics
  export_format: "prometheus"        # prometheus (the only option, but we made it configurable anyway)
  cardinality_threshold: 100         # Warn when unique label combos exceed this
  default_buckets:                   # Default histogram bucket boundaries
    - 0.001
    - 0.005
    - 0.01
    - 0.025
    - 0.05
    - 0.1
    - 0.25
    - 0.5
    - 1.0
    - 2.5
    - 5.0
    - 10.0
  dashboard:
    width: 60                        # ASCII dashboard width
    sparkline_length: 20             # Number of data points in sparklines
  bob_mcfizzington:
    initial_stress_level: 42.0       # Bob's baseline stress level (it's always 42)

# Webhook Notification System configuration
# Because the only thing more important than computing FizzBuzz
# is immediately notifying every downstream system that you computed
# FizzBuzz. In a real microservices architecture, webhooks enable
# event-driven integration. Here, they enable simulated HTTP POST
# requests to fictional endpoints about modulo arithmetic results.
# The deliveries are not real. The HMAC signatures are.
webhooks:
  enabled: false                        # Master switch — opt-in via --webhooks
  endpoints: []                         # List of webhook endpoint URLs
  secret: "enterprise-fizzbuzz-webhook-secret-do-not-share"  # HMAC-SHA256 signing secret
  subscribed_events:                    # Event types that trigger webhook dispatch
    - "FIZZ_DETECTED"
    - "BUZZ_DETECTED"
    - "FIZZBUZZ_DETECTED"
    - "SESSION_STARTED"
    - "SESSION_ENDED"
    - "ERROR_OCCURRED"
  retry:
    max_retries: 3                      # Maximum delivery attempts before DLQ
    backoff_base_ms: 1000               # Base delay for exponential backoff
    backoff_multiplier: 2.0             # Exponential backoff multiplier
    backoff_max_ms: 30000               # Maximum backoff delay
  dead_letter_queue:
    max_size: 100                       # Maximum entries in the DLQ
  simulated_client:
    success_rate_percent: 80            # Deterministic success threshold (hash-based)
  dashboard:
    width: 60                           # ASCII dashboard width

# Service Mesh Simulation configuration
# Because the only thing better than a monolithic FizzBuzz application
# is decomposing it into seven microservices, each with its own sidecar
# proxy, mTLS encryption (base64, naturally), circuit breakers, and
# canary deployments. If Google needs a service mesh for Gmail, surely
# our modulo arithmetic deserves one too.
service_mesh:
  enabled: false                        # Master switch — opt-in via --service-mesh
  mtls:
    enabled: true                       # Enable "military-grade" mTLS (base64 encode/decode)
    log_handshakes: true                # Log every mTLS handshake for compliance theatre
  fault_injection:
    latency_enabled: false              # Inject simulated network latency between services
    latency_min_ms: 1                   # Minimum injected latency (milliseconds)
    latency_max_ms: 10                  # Maximum injected latency (milliseconds)
    packet_loss_enabled: false          # Simulate packet loss between services
    packet_loss_rate: 0.05              # Probability of dropping a request (0.0 - 1.0)
  canary:
    enabled: false                      # Enable canary deployments for v2 services
    traffic_percentage: 20              # Percentage of traffic routed to canary (v2)
  circuit_breaker:
    enabled: true                       # Enable per-service mesh circuit breakers
    failure_threshold: 3                # Failures before tripping the mesh circuit
    reset_timeout_ms: 5000              # Time before attempting half-open

# Observer configuration
observers:
  console_observer:
    enabled: false
  statistics_observer:
    enabled: true
